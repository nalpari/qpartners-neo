# Production 배포 설정 (2 인스턴스 동시 운영, 로드 분산용)
#
# 구성:
#   - app-1: PORT 5000 (qpartners-app-1)
#   - app-2: PORT 5001 (qpartners-app-2)
#   - 두 컨테이너 모두 동일 이미지 + .env.production 공유
#   - 업로드 볼륨 공유: ${APP_ROOT}/uploads_data → /data/uploads
#
# 필요 환경변수:
#   IMAGE_TAG: latest (기본값) — Jenkins 빌드 번호로 오버라이드
#   APP_ROOT:  업로드 볼륨 베이스 경로 (예: /home/interplug/qpartners/production)
#
# 사용법:
#   Jenkins:  IMAGE_TAG=123 APP_ROOT=/home/interplug/qpartners/production \
#               docker compose -f docker-compose-production.yml up -d
#   롤백:     IMAGE_TAG=122 APP_ROOT=... docker compose -f docker-compose-production.yml up -d

services:
  app-1:
    image: qpartners-neo:release-${IMAGE_TAG:-latest}
    container_name: qpartners-app-1
    restart: unless-stopped
    network_mode: host
    env_file: .env.production
    environment:
      APP_ENV: production
      PORT: 5000
      UPLOAD_DIR: /data/uploads
    volumes:
      - ${APP_ROOT}/uploads_data:/data/uploads

  app-2:
    image: qpartners-neo:release-${IMAGE_TAG:-latest}
    container_name: qpartners-app-2
    restart: unless-stopped
    network_mode: host
    env_file: .env.production
    environment:
      APP_ENV: production
      PORT: 5001
      UPLOAD_DIR: /data/uploads
    volumes:
      - ${APP_ROOT}/uploads_data:/data/uploads
