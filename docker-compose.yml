# 환경별 빌드 설정
# APP_ENV: development (기본값) | production
# APP_PORT: 5010 (기본값)
#
# 사용법:
#   개발 모드:  docker compose up -d --build
#   운영 모드:  APP_ENV=production APP_PORT=3000 docker compose up -d --build

services:
  app:
    build:
      context: .
      args:
        PORT: ${APP_PORT:-5010}
    container_name: qpartners-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5010}:${APP_PORT:-5010}"
    env_file: .env.${APP_ENV:-development}
    environment:
      UPLOAD_DIR: /data/uploads
    volumes:
      - ${APP_ROOT:-/home/development/apps/qpartners-neo}/uploads_data:/data/uploads
