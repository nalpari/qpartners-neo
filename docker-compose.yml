# 환경별 빌드 설정
# APP_ENV: development (기본값) | production
# APP_PORT: 5010 (기본값)
# IMAGE_TAG: latest (기본값) — Jenkins 빌드 번호로 오버라이드
#
# 사용법:
#   로컬 개발:  docker compose up -d --build
#   Jenkins:   IMAGE_TAG=123 APP_PORT=5010 APP_ENV=development docker compose up -d
#   롤백:      IMAGE_TAG=122 docker compose up -d

services:
  app:
    image: qpartners-neo:${IMAGE_TAG:-latest}
    build:
      context: .
      args:
        PORT: ${APP_PORT:-5010}
    container_name: qpartners-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5010}:${APP_PORT:-5010}"
    env_file: .env.${APP_ENV:-development}
    environment:
      UPLOAD_DIR: /data/uploads
    volumes:
      - ${APP_ROOT:-/home/development/apps/qpartners-neo}/uploads_data:/data/uploads
