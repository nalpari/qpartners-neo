services:
  app:
    build: .
    container_name: qpartners-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: qpartners
      DB_PASSWORD: interplug-dev
      DB_NAME: qpartners
      DATABASE_URL: "mysql://qpartners:interplug-dev@db:3306/qpartners"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    container_name: qpartners-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: qpartners
      MYSQL_USER: qpartners
      MYSQL_PASSWORD: interplug-dev
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
